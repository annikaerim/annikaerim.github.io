<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <style>
        body { font-family: Arial; margin: 0; background: #f4f4f4; }
        header, footer { background: #333; color: white; text-align: center; padding: 15px; }
        nav { background: #555; padding: 10px; text-align: center; }
        nav a { color: white; margin: 0 10px; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        .container { padding: 20px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card-content h3 {
            margin: 0 0 10px;
        }
    </style>
</head>
<body>

<header>
    <h1>My Portfolio</h1>
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="portfolio.html">Portfolio</a>
    <a href="contact.html">Contact</a>
</nav>

<div class="container">
    <h2>Things I've Made</h2>

    <div class="grid">
        <div class="card">
            <img src="https://via.placeholder.com/400x300" alt="Project 1">
            <div class="card-content">
                <h3>Project One</h3>
                <p>Short description of what this is.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/400x300" alt="Project 2">
            <div class="card-content">
                <h3>Project Two</h3>
                <p>Describe your creation here.</p>
            </div>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/400x300" alt="Project 3">
            <div class="card-content">
                <h3>Project Three</h3>
                <p>Explain what makes this cool.</p>
            </div>
        </div>
    </div>
</div>

<footer>
    <p>&copy; 2026 My Website</p>
</footer>

</body>
</html>
